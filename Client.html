<script>
const App = (function () {
  'use strict';

  const state = {
    bootstrap: null,
    meetings: [],
    transcripts: [],
    transcriptFiles: [],
    selectedMeetingId: '',
    quiz: null,
    buildSession: null,
    sourceResults: [],
    editGuide: null,
    guides: [],
    executions: [],
    selectedGuide: null,
    preflight: null,
    execution: null,
    executionGuide: null,
    saveRequestToken: '',
    automation: null,
    aiSettings: null,
    approvedAnalysisReview: ''
  };

  function server(name) {
    const args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function (resolve, reject) {
      const runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(function (error) {
        reject(new Error(error && error.message ? error.message : String(error)));
      });
      runner[name].apply(runner, args);
    });
  }

  async function call(name) {
    const args = Array.prototype.slice.call(arguments, 1);
    setBusy(true);
    try {
      const result = await server.apply(null, [name].concat(args));
      if (!result || result.success === false) throw clientError(result);
      return result;
    } finally {
      setBusy(false);
    }
  }

  function clientError(result) {
    const error = new Error(result && result.error ? result.error : '処理に失敗しました。');
    error.details = result && result.details;
    error.result = result;
    return error;
  }

  async function init() {
    bindNavigation();
    try {
      state.bootstrap = await call('getBootstrapData');
      document.getElementById('global-status').textContent = state.bootstrap.configured ? '設定済み' : '要セットアップ';
      document.getElementById('setup-warning').classList.toggle('hidden', state.bootstrap.configured);
      renderDashboard();
      if (state.bootstrap.configured) { await loadMeetings(); await loadTranscriptWorkflows(); }
    } catch (error) {
      showError(error);
      document.getElementById('global-status').textContent = 'エラー';
    }
  }

  function bindNavigation() {
    document.querySelectorAll('.app-nav button').forEach(function (button) {
      button.addEventListener('click', function () { showView(button.dataset.view); });
    });
    const transcriptSelect = document.getElementById('transcript-select');
    transcriptSelect.addEventListener('change', function () {
      document.getElementById('transcript-file-id').value = transcriptSelect.value;
      const file = state.transcriptFiles.find(function (item) { return item.fileId === transcriptSelect.value; });
      if (file) applyMeetingDefaults(file.name, file.location);
    });
    document.getElementById('transcript-file-id').addEventListener('change', async function (event) {
      const fileId = event.target.value.trim();
      if (!fileId || fileId === transcriptSelect.value) return;
      try {
        const result = await call('getTranscriptFileDefaults', fileId);
        applyMeetingDefaults(result.defaults.title, result.defaults.category);
      } catch (error) { showError(error); }
    });
    document.getElementById('analysis-review').addEventListener('input', function (event) {
      if (event.target.value.trim() === state.approvedAnalysisReview) return;
      document.getElementById('analysis-review-confirm').checked = false;
      document.getElementById('analysis-json-stage').classList.add('hidden');
      document.getElementById('analysis-json-prompt').value = '';
    });
  }

  function applyMeetingDefaults(title, category) {
    const form = document.getElementById('meeting-form');
    if (title) form.elements.title.value = title;
    const select = document.getElementById('meeting-category');
    if (category && Array.from(select.options).some(function (option) { return option.value === category; })) select.value = category;
  }

  async function showView(name) {
    document.querySelectorAll('.view').forEach(function (view) { view.classList.remove('active'); });
    const navigationView = name === 'builder' ? 'actions' : name;
    document.querySelectorAll('.app-nav button').forEach(function (button) { button.classList.toggle('active', button.dataset.view === navigationView); });
    const view = document.getElementById('view-' + name);
    if (view) view.classList.add('active');
    if (!state.bootstrap || !state.bootstrap.configured) return;
    try {
      if (name === 'dashboard') await refreshDashboard();
      if (name === 'meetings') await loadMeetings();
      if (name === 'quiz') await populateQuizMeetings();
      if (name === 'actions') await loadActions();
      if (name === 'guides') await loadGuides();
      if (name === 'admin') { await runDiagnostics(); await loadAllowedActions(); await loadAutomationPanel(); await loadAutomationCandidates(); }
    } catch (error) { showError(error); }
  }

  async function refreshDashboard() {
    state.bootstrap = await call('getBootstrapData');
    renderDashboard();
    if (state.bootstrap.configured) await loadTranscriptWorkflows();
  }

  async function runInitialSetup() {
    try {
      const result = await call('runSetupGuide');
      if (!result.success) throw new Error('初期設定は実行されましたが、診断エラーが残っています。');
      toast('Drive フォルダと管理スプレッドシートを作成しました。');
      state.bootstrap = await call('getBootstrapData');
      document.getElementById('setup-warning').classList.add('hidden');
      document.getElementById('global-status').textContent = '設定済み';
      renderDashboard();
      await loadMeetings();
      await loadTranscriptWorkflows();
    } catch (error) { showError(error); }
  }

  function renderDashboard() {
    const counts = state.bootstrap && state.bootstrap.counts ? state.bootstrap.counts : { meetings: 0, actions: 0, guides: 0, guidesAwaitingReview: 0, activeExecutions: 0 };
    const labels = [['meetings', '登録会議'], ['guidesAwaitingReview', 'ガイド承認待ち'], ['guides', '作業ガイド'], ['activeExecutions', '進行中・中断中']];
    document.getElementById('dashboard-counts').innerHTML = labels.map(function (item) {
      return '<div class="metric"><span>' + item[1] + '</span><strong>' + escapeHtml(counts[item[0]]) + '</strong></div>';
    }).join('');
  }

  async function loadTranscriptWorkflows() {
    if (!state.bootstrap || !state.bootstrap.configured) return;
    const result = await call('listTranscriptWorkflows');
    state.transcripts = result.transcripts || [];
    renderTranscriptWorkflows();
  }

  function renderTranscriptWorkflows() {
    const active = state.transcripts.filter(function (entry) { return entry.stage !== 'completed'; });
    const done = state.transcripts.filter(function (entry) { return entry.stage === 'completed'; });
    document.getElementById('transcript-workflow-list').innerHTML = active.length ? active.map(function (entry) {
      const meta = [entry.stageLabel]
        .concat(entry.meetingTitle ? ['会議: ' + entry.meetingTitle] : [])
        .concat(entry.location ? ['フォルダ: ' + entry.location] : [])
        .concat(entry.guideCount !== undefined ? ['ガイド ' + entry.guideCount + '件 / 承認待ち ' + (entry.guideNeedsReviewCount || 0) + '件'] : [])
        .concat(entry.automationStatus ? ['自動処理: ' + entry.automationStatus] : [])
        .concat(entry.automationError ? ['エラー: ' + entry.automationError] : []);
      return '<div class="list-row"><div><strong><a target="_blank" href="' + attr(entry.url) + '">' + escapeHtml(entry.name) + '</a></strong><div class="meta">' + escapeHtml(meta.join(' / ')) + '</div></div><div class="button-row"><button onclick="App.selectTranscript(\'' + attr(entry.fileId) + '\')">' + escapeHtml(transcriptNextLabel(entry)) + '</button><button class="secondary" onclick="App.completeTranscript(\'' + attr(entry.fileId) + '\')">完了にする</button></div></div>';
    }).join('') : '未完了の文字起こしはありません。';
    document.getElementById('transcript-done-wrap').classList.toggle('hidden', !done.length);
    document.getElementById('transcript-done-list').innerHTML = done.map(function (entry) {
      return '<div class="list-row"><div><strong><a target="_blank" href="' + attr(entry.url) + '">' + escapeHtml(entry.name) + '</a></strong><div class="meta">' + escapeHtml('完了' + (entry.completedAt ? ' / ' + entry.completedAt : '') + (entry.meetingTitle ? ' / 会議: ' + entry.meetingTitle : '')) + '</div></div><button class="secondary" onclick="App.reopenTranscript(\'' + attr(entry.fileId) + '\')">未完了に戻す</button></div>';
    }).join('');
  }

  function transcriptNextLabel(entry) {
    if (entry.stage === 'register') return '会議として登録';
    if (entry.stage === 'analysis') return '解析へ進む';
    if (entry.stage === 'quiz') return 'クイズへ進む';
    return entry.guideNeedsReviewCount ? '承認待ちガイドを見る' : '作業ガイドを見る';
  }

  async function selectTranscript(fileId) {
    const entry = state.transcripts.find(function (item) { return item.fileId === fileId; });
    if (!entry) return;
    try {
      if (entry.stage === 'register') {
        await showView('meetings');
        document.getElementById('transcript-select').value = entry.fileId;
        document.getElementById('transcript-file-id').value = entry.fileId;
        applyMeetingDefaults(entry.name, entry.location);
        toast('文字起こしを選択しました。自動入力された内容を確認して登録してください。');
        document.getElementById('meeting-form').scrollIntoView({ behavior: 'smooth' });
      } else if (entry.stage === 'analysis') {
        await showView('meetings');
        await selectMeeting(entry.meetingId);
      } else if (entry.stage === 'quiz') {
        await showView('quiz');
        document.getElementById('quiz-meeting-select').value = entry.meetingId;
        toast('回答方式を選んでクイズを開始してください。');
      } else {
        await showView('guides');
      }
    } catch (error) { showError(error); }
  }

  async function completeTranscript(fileId) {
    const entry = state.transcripts.find(function (item) { return item.fileId === fileId; });
    const warning = entry && entry.stage !== 'guide' ? '\n※ まだ「' + entry.stageLabel + '」の段階です。' : '';
    if (!window.confirm('この文字起こしを完了扱いにして「完了」フォルダへ移動しますか？' + warning)) return;
    try {
      await call('completeTranscript', fileId);
      toast('完了フォルダへ移動しました。');
      await loadTranscriptWorkflows();
    } catch (error) { showError(error); }
  }

  async function reopenTranscript(fileId) {
    if (!window.confirm('この文字起こしを未完了に戻し、元のカテゴリーフォルダへ移動しますか？')) return;
    try {
      await call('reopenTranscript', fileId);
      toast('未完了に戻しました。');
      await loadTranscriptWorkflows();
    } catch (error) { showError(error); }
  }

  async function loadMeetings() {
    const results = await Promise.all([call('listMeetings'), call('listTranscriptFiles')]);
    state.meetings = results[0].meetings || [];
    state.transcriptFiles = results[1].files || [];
    const settings = state.bootstrap.settings || {};
    document.getElementById('meeting-category').innerHTML = (settings.categories || []).map(function (category) { return '<option>' + escapeHtml(category) + '</option>'; }).join('');
    document.getElementById('transcript-select').innerHTML = '<option value="">フォルダから選択</option>' + state.transcriptFiles.map(function (file) { return '<option value="' + attr(file.fileId) + '">' + escapeHtml(file.name + (file.location ? ' (' + file.location + ')' : '')) + '</option>'; }).join('');
    document.getElementById('meeting-list').innerHTML = state.meetings.length ? state.meetings.map(function (meeting) {
      return '<div class="list-row"><div><strong>' + escapeHtml(meeting.title) + '</strong><div class="meta">' + escapeHtml(meeting.meetingId + ' / ' + meeting.category + ' / ' + meeting.analysisStatus) + '</div></div><button class="secondary" onclick="App.selectMeeting(\'' + attr(meeting.meetingId) + '\')">解析</button></div>';
    }).join('') : 'まだありません';
    populateQuizMeetings(false);
  }

  async function registerMeeting(event) {
    event.preventDefault();
    try {
      const form = new FormData(event.target);
      const payload = Object.fromEntries(form.entries());
      payload.transcriptFileId = document.getElementById('transcript-file-id').value.trim();
      if (!payload.transcriptFileId) throw new Error('文字起こしファイルを選択するか、ファイルIDを入力してください。');
      const result = await call('registerMeeting', payload);
      toast('会議を登録しました。続けて解析プロンプトを作成します。');
      event.target.reset();
      await loadMeetings();
      await selectMeeting(result.meeting.meetingId);
    } catch (error) { showError(error); }
  }

  async function selectMeeting(meetingId) {
    try {
      state.selectedMeetingId = meetingId;
      const meeting = state.meetings.find(function (item) { return item.meetingId === meetingId; });
      const result = await call('getMeetingAnalysisPrompt', meetingId);
      document.getElementById('analysis-workspace').classList.remove('hidden');
      document.getElementById('analysis-meeting-label').textContent = meeting ? meeting.title : meetingId;
      document.getElementById('analysis-prompt').value = result.prompt;
      document.getElementById('analysis-review').value = '';
      document.getElementById('analysis-review-confirm').checked = false;
      document.getElementById('analysis-json-prompt').value = '';
      document.getElementById('analysis-json').value = '';
      document.getElementById('analysis-json-stage').classList.add('hidden');
      document.getElementById('analysis-validation').className = 'validation-box hidden';
      state.approvedAnalysisReview = '';
      document.getElementById('save-analysis-button').disabled = meeting && meeting.analysisStatus === 'completed';
      showView('meetings');
      document.getElementById('analysis-workspace').scrollIntoView({ behavior: 'smooth' });
    } catch (error) { showError(error); }
  }

  async function prepareAnalysisJsonPrompt() {
    try {
      const reviewedText = document.getElementById('analysis-review').value.trim();
      const confirmed = document.getElementById('analysis-review-confirm').checked;
      const result = await call('prepareMeetingAnalysisJsonPrompt', state.selectedMeetingId, reviewedText, confirmed);
      state.approvedAnalysisReview = result.approvedReview;
      document.getElementById('analysis-json-prompt').value = result.prompt;
      document.getElementById('analysis-json-stage').classList.remove('hidden');
      toast('確認済みの方向性を含むJSON生成プロンプトを作成しました。');
      document.getElementById('analysis-json-stage').scrollIntoView({ behavior: 'smooth' });
    } catch (error) { showError(error); }
  }

  async function validateAnalysis() {
    const box = document.getElementById('analysis-validation');
    try {
      const result = await call('validateMeetingAnalysisJson', document.getElementById('analysis-json').value);
      box.className = 'validation-box success';
      box.textContent = '検証OK: 作業候補 ' + result.analysis.actionCandidates.length + '件 / クイズ ' + result.analysis.quiz.questions.length + '問';
    } catch (error) { renderValidationError(box, error); }
  }

  async function saveAnalysis() {
    const button = document.getElementById('save-analysis-button');
    const box = document.getElementById('analysis-validation');
    button.disabled = true;
    try {
      const currentReview = document.getElementById('analysis-review').value.trim();
      if (!state.approvedAnalysisReview || currentReview !== state.approvedAnalysisReview || !document.getElementById('analysis-review-confirm').checked) {
        throw new Error('確認案を変更した場合は、もう一度「この方向性でJSON用プロンプトを作る」を押してください。');
      }
      const result = await call('saveMeetingAnalysis', state.selectedMeetingId, document.getElementById('analysis-json').value, {
        approvedReview: state.approvedAnalysisReview,
        reviewConfirmed: true
      });
      box.className = 'validation-box success';
      box.innerHTML = '保存しました。作業候補 ' + result.actionCount + '件 / クイズ ' + result.questionCount + '問。 <a href="' + attr(result.summaryFileUrl) + '" target="_blank">会議要約を開く</a>';
      toast('会議解析を保存しました。');
      await loadMeetings();
    } catch (error) { button.disabled = false; renderValidationError(box, error); }
  }

  async function populateQuizMeetings(fetch) {
    if (fetch !== false && !state.meetings.length) {
      const result = await call('listMeetings');
      state.meetings = result.meetings || [];
    }
    const analyzed = state.meetings.filter(function (meeting) { return meeting.analysisStatus === 'completed' && meeting.workflowStatus !== 'completed'; });
    document.getElementById('quiz-meeting-select').innerHTML = analyzed.length ? analyzed.map(function (meeting) { return '<option value="' + attr(meeting.meetingId) + '">' + escapeHtml(meeting.title) + '</option>'; }).join('') : '<option value="">解析済み会議なし</option>';
  }

  async function openQuiz() {
    try {
      const meetingId = document.getElementById('quiz-meeting-select').value;
      if (!meetingId) throw new Error('解析済み会議を選択してください。');
      state.quiz = await call('openQuiz', meetingId, document.getElementById('quiz-mode').value);
      renderQuiz();
      await loadInteractionHistory({ meetingId: meetingId }, 'quiz-ai-history');
    } catch (error) { showError(error); }
  }

  function renderQuiz() {
    const quiz = state.quiz.quiz;
    const session = state.quiz.session;
    document.getElementById('quiz-workspace').classList.remove('hidden');
    document.getElementById('quiz-header').innerHTML = '<h3>' + escapeHtml(quiz.quizTitle) + '</h3><p class="meta">' + quiz.questions.length + '問 / 回答は自動保存されます</p>';
    if (session.mode === 'single') renderSingleQuiz(); else renderBatchQuiz();
  }

  function renderSingleQuiz() {
    const quiz = state.quiz.quiz;
    const session = state.quiz.session;
    let question = quiz.questions.find(function (item) { return session.questionStates[item.questionId] !== 'explanation_viewed'; });
    if (!question) {
      document.getElementById('quiz-questions').innerHTML = '<p>全問の回答と解説確認が終わりました。</p><button onclick="App.submitCurrentQuiz()">採点結果を保存</button>';
      return;
    }
    const prior = session.answers[question.questionId] || [];
    document.getElementById('quiz-questions').innerHTML = questionHtml(question, prior) + '<button onclick="App.answerSingle(\'' + attr(question.questionId) + '\')">回答する</button><div id="single-explanation"></div>';
  }

  function renderBatchQuiz() {
    const quiz = state.quiz.quiz;
    const answers = state.quiz.session.answers || {};
    document.getElementById('quiz-questions').innerHTML = quiz.questions.map(function (question) { return questionHtml(question, answers[question.questionId] || []); }).join('') + '<button onclick="App.submitBatchQuiz()">全回答を保存して採点</button>';
  }

  function questionHtml(question, selected) {
    const multiple = question.type === 'multi_choice';
    return '<fieldset class="question" data-question="' + attr(question.questionId) + '"><legend>' + escapeHtml(question.question) + (multiple ? '（正解 ' + question.correctCount + '個）' : '') + '</legend>' + question.choices.map(function (choice, index) {
      return '<label class="choice"><input type="' + (multiple ? 'checkbox' : 'radio') + '" name="q-' + attr(question.questionId) + '" value="' + index + '" ' + (selected.indexOf(index) >= 0 ? 'checked' : '') + '>' + escapeHtml(choice) + '</label>';
    }).join('') + '</fieldset>';
  }

  function selectedChoices(questionId) {
    return Array.from(document.querySelectorAll('[name="q-' + cssEscape(questionId) + '"]:checked')).map(function (input) { return Number(input.value); });
  }

  async function answerSingle(questionId) {
    try {
      const choices = selectedChoices(questionId);
      const result = await call('saveQuizAnswer', state.quiz.session.quizSessionId, questionId, choices);
      state.quiz.session.answers[questionId] = choices;
      state.quiz.session.questionStates[questionId] = 'answered';
      const explanation = document.getElementById('single-explanation');
      explanation.className = result.result.correct ? 'validation-box success' : 'validation-box error';
      explanation.innerHTML = '<strong>' + (result.result.correct ? '正解' : '不正解') + '</strong><p>' + escapeHtml(result.result.explanation) + '</p><button onclick="App.continueSingle(\'' + attr(questionId) + '\')">解説を確認して次へ</button>';
    } catch (error) { showError(error); }
  }

  async function continueSingle(questionId) {
    try {
      await call('markQuizExplanationViewed', state.quiz.session.quizSessionId, questionId);
      state.quiz.session.questionStates[questionId] = 'explanation_viewed';
      renderSingleQuiz();
    } catch (error) { showError(error); }
  }

  async function submitBatchQuiz() {
    try {
      for (const question of state.quiz.quiz.questions) {
        const choices = selectedChoices(question.questionId);
        await call('saveQuizAnswer', state.quiz.session.quizSessionId, question.questionId, choices);
        state.quiz.session.answers[question.questionId] = choices;
      }
      await submitCurrentQuiz();
    } catch (error) { showError(error); }
  }

  async function submitCurrentQuiz() {
    try {
      const result = await call('submitQuiz', state.quiz.session.quizSessionId);
      state.quiz.session.status = result.passed ? 'completed' : 'retry_required';
      state.quiz.session.answers = result.passed ? state.quiz.session.answers : {};
      state.quiz.session.questionStates = result.passed ? state.quiz.session.questionStates : {};
      const resultClass = result.passed ? 'success' : 'error';
      const resultMessage = result.passed ? '全問正解です。作業ガイドを作成できます。' : '全問正解になるまで、もう一度回答してください。';
      document.getElementById('quiz-result').innerHTML = '<div class="validation-box ' + resultClass + '"><strong>' + result.score.correctCount + ' / ' + result.score.total + '問正解（' + result.score.percentage + '%）</strong><p>' + resultMessage + '</p></div>' + result.incorrectExplanations.map(function (item) { return '<div class="validation-box error"><strong>' + escapeHtml(item.questionId) + '</strong>: ' + escapeHtml(item.explanation) + '</div>'; }).join('') + (result.passed ? '' : '<button onclick="App.retryCurrentQuiz()">もう一度回答する</button>');
      document.getElementById('quiz-questions').innerHTML = '';
      if (result.passed) toast('クイズに全問正解しました。この会議の作業ガイド作成が可能になりました。');
    } catch (error) { showError(error); }
  }

  function retryCurrentQuiz() {
    document.getElementById('quiz-result').innerHTML = '';
    renderQuiz();
  }

  async function loadActions() {
    const result = await call('listActionCandidates', '');
    const actions = result.actions || [];
    document.getElementById('action-list').innerHTML = actions.length ? actions.map(function (action) {
      const guideAction = action.status === 'guide_ready'
        ? '<span class="guide-status ready">ガイド保存済み</span>'
        : action.status === 'guide_review'
          ? '<span class="guide-status needs_review">ガイド承認待ち</span>'
          : action.quizPassed
            ? '<button onclick="App.startBuild(\'' + attr(action.actionId) + '\')">' + (action.status === 'guide_building' ? '手動作成を続ける' : 'この候補から手動作成') + '</button>'
            : '<span class="guide-status needs_review">この会議のクイズ全問正解後に作成できます</span>';
      return '<article class="item-card"><h3>' + escapeHtml(action.title) + '</h3><p>' + escapeHtml(action.description) + '</p><p class="meta">' + escapeHtml(action.actionId + ' / 状態: ' + action.status) + '</p>' + guideAction + '</article>';
    }).join('') : '作業候補はまだありません';
  }

  async function startBuild(actionId) {
    try {
      const result = await call('startWorkGuideBuild', actionId, 'manual');
      state.buildSession = result.session;
      state.editGuide = result.session.data.importedWorkGuide || null;
      state.saveRequestToken = '';
      resetBuilderForm();
      renderBuilder();
      showView('builder');
    } catch (error) { showError(error); }
  }

  async function reviseGuide(workGuideId) {
    try {
      const result = await call('startWorkGuideRevision', workGuideId);
      state.buildSession = result.session;
      state.editGuide = result.session.data.importedWorkGuide || null;
      state.saveRequestToken = '';
      resetBuilderForm();
      renderBuilder();
      showView('builder');
    } catch (error) { showError(error); }
  }

  function resetBuilderForm() {
    ['skeleton-prompt', 'skeleton-import', 'interview-free-answer', 'interview-prompt', 'interview-reply', 'guide-prompt', 'guide-json-import', 'desk-review-prompt', 'desk-review-reply', 'review-feedback', 'revision-prompt', 'source-query'].forEach(function (id) { document.getElementById(id).value = ''; });
    ['skeleton-summary', 'interview-status', 'interview-questions', 'interview-result', 'ledger-heatmap', 'ledger-open-entries', 'desk-review-result', 'source-results', 'guide-depth-findings', 'guide-save-result'].forEach(function (id) { document.getElementById(id).innerHTML = ''; });
    document.getElementById('guide-json-prompt-stage').classList.add('hidden');
    document.getElementById('guide-import-validation').className = 'validation-box hidden';
    document.getElementById('guide-import-validation').innerHTML = '';
    document.getElementById('guide-save-result').className = '';
    document.getElementById('gate-confirm').checked = false;
    document.getElementById('guide-save-confirm').checked = false;
    document.getElementById('save-guide-button').disabled = false;
    document.getElementById('guide-review-panel').classList.add('hidden');
    document.getElementById('guide-editor-panel').classList.add('hidden');
    document.getElementById('guide-save-panel').classList.add('hidden');
  }

  function renderBuilder() {
    const session = state.buildSession;
    if (!session) return;
    document.getElementById('builder-empty').classList.add('hidden');
    document.getElementById('builder-workspace').classList.remove('hidden');
    document.getElementById('build-session-label').textContent = session.buildSessionId;
    document.getElementById('cancel-guide-build-button').classList.toggle('hidden', Boolean(session.data.revisionWorkGuideId) || session.status === 'completed');
    renderBuilderStepper();
    document.getElementById('builder-action').innerHTML = '<h4>' + escapeHtml(session.data.action.title) + '</h4><p>' + escapeHtml(session.data.action.description) + '</p>' +
      ((session.data.interviewSeeds || []).length ? '<div class="notice warning"><strong>前回実行からの取材対象（ガイド外参照の記録） ' + session.data.interviewSeeds.length + '件</strong><ul>' + session.data.interviewSeeds.map(function (seed) {
        const text = typeof seed === 'string' ? seed : '手順 ' + (seed.stepId || '?') + ': ' + (seed.note || '');
        return '<li>' + escapeHtml(text) + '</li>';
      }).join('') + '</ul></div>' : '');
    document.getElementById('known-prerequisites').value = (session.data.knownPrerequisites || []).join('\n');
    if (session.data.lastSkeletonPrompt) document.getElementById('skeleton-prompt').value = session.data.lastSkeletonPrompt;
    if (session.data.lastInterviewPrompt) document.getElementById('interview-prompt').value = session.data.lastInterviewPrompt;
    if (session.data.lastDeskReviewPrompt) document.getElementById('desk-review-prompt').value = session.data.lastDeskReviewPrompt;
    renderSkeletonSummary();
    renderInterviewPanel();
    renderLedgerPanels();
    renderDeskReviewResult(session.data.deskReview || null);
    if (session.data.lastAiPrompt) {
      const promptField = ['work_guide_revision', 'work_guide_depth_check'].indexOf(session.data.lastAiPromptPhase) >= 0 ? 'revision-prompt' : 'guide-prompt';
      document.getElementById(promptField).value = session.data.lastAiPrompt;
      if (session.data.lastAiPromptPhase === 'work_guide_generation') document.getElementById('guide-json-prompt-stage').classList.remove('hidden');
    }
    if (state.editGuide) {
      renderDraftPreview();
      if (session.data.deskReview && session.data.deskReview.passed) renderGuideEditor();
      else {
        document.getElementById('guide-editor-panel').classList.add('hidden');
        document.getElementById('guide-save-panel').classList.add('hidden');
      }
    }
  }

  function renderBuilderStepper() {
    const session = state.buildSession;
    document.getElementById('builder-stepper').innerHTML = Array.from({ length: 10 }, function (_, index) {
      const step = index + 1;
      const className = session.status === 'completed' || step < session.currentStep ? 'done' : step === session.currentStep ? 'current' : '';
      return '<li class="' + className + '">STEP ' + step + '</li>';
    }).join('');
  }

  function renderSkeletonSummary() {
    const session = state.buildSession;
    const data = session && session.data ? session.data : {};
    const target = document.getElementById('skeleton-summary');
    if (!data.skeleton) { target.innerHTML = ''; return; }
    const readiness = session.readiness;
    target.innerHTML = '<div class="validation-box success"><strong>骨格と台帳を取り込み済み</strong><p>' + escapeHtml(data.skeleton.purpose || '') + '</p><p class="meta">完了状態: ' + escapeHtml(data.skeleton.completion || '') + '</p><ol>' + (data.skeleton.steps || []).map(function (step) { return '<li>' + escapeHtml(step.skeletonId + ' ' + step.title) + '</li>'; }).join('') + '</ol><p class="meta">台帳 ' + (data.ledger || []).length + '件 / 準備度 ' + (readiness ? readiness.overallScore + '%' : '-') + '</p></div>';
  }

  function renderInterviewPanel() {
    const session = state.buildSession;
    const data = session && session.data ? session.data : {};
    const status = document.getElementById('interview-status');
    if (!data.skeleton) {
      status.innerHTML = '<p class="muted">先に STEP 4 で骨格と台帳を初期化してください。</p>';
      document.getElementById('interview-questions').innerHTML = '';
      return;
    }
    const rounds = data.interviewRounds || [];
    const readiness = session.readiness;
    const last = rounds[rounds.length - 1];
    const prev = rounds[rounds.length - 2];
    const delta = last && prev ? Number(last.score) - Number(prev.score) : null;
    status.innerHTML = '<p class="meta">取材ラウンド ' + rounds.length + '回 / 準備度 ' + (readiness ? readiness.overallScore : 0) + '%' + (delta !== null ? '（前回比 ' + (delta >= 0 ? '+' : '') + delta + 'pt）' : '') + ' / 確認済み ' + (readiness ? readiness.confirmedCount : 0) + '件 / 作業前に確認へ降格 ' + (readiness ? readiness.deferredCount : 0) + '件</p>';
    renderInterviewQuestions(data.pendingQuestions || []);
  }

  function renderInterviewQuestions(questions) {
    const target = document.getElementById('interview-questions');
    if (!questions.length) {
      target.innerHTML = '<p class="muted">未回答の質問はありません。追加情報だけ書いて「取材プロンプトを作成」で次のラウンドを始めるか、STEP 6 のゲートへ進んでください。</p>';
      return;
    }
    target.innerHTML = questions.map(function (question, index) {
      const options = ['はい', 'いいえ', 'わからない', '作業前に確認でよい'];
      return '<div class="ledger-question"><div class="lq-text">' + escapeHtml(question.text).replace(/\n/g, '<br>') + '</div>' +
        '<div class="lq-options">' + options.map(function (option) {
          return '<label class="check-line"><input type="radio" name="lq-' + index + '" value="' + attr(option) + '">' + escapeHtml(option) + '</label>';
        }).join('') + '</div><label>補足・現物の貼り付け（URLや画面の文言はそのまま貼るのが確実）<textarea rows="2" data-question-answer="' + index + '"></textarea></label></div>';
    }).join('');
  }

  function collectInterviewAnswers() {
    const data = state.buildSession.data;
    const questions = data.pendingQuestions || [];
    const parts = [];
    const deferrals = [];
    questions.forEach(function (question, index) {
      const chosen = document.querySelector('[name="lq-' + index + '"]:checked');
      const noteField = document.querySelector('[data-question-answer="' + index + '"]');
      const note = noteField ? noteField.value.trim() : '';
      const answer = chosen ? chosen.value : '';
      if (!answer && !note) return;
      parts.push('【' + question.questionId + '】\n質問: ' + question.text + '\n回答: ' + (answer || '（選択なし）') + (note ? '\n補足・貼り付け:\n' + note : ''));
      if (answer === '作業前に確認でよい' && question.stepRef && question.slot) {
        deferrals.push({ stepRef: question.stepRef, slot: question.slot, label: question.text.split('\n')[0].slice(0, 60) });
      }
    });
    const free = document.getElementById('interview-free-answer').value.trim();
    if (free) parts.push('【追加情報・現物の貼り付け】\n' + free);
    return { text: parts.join('\n\n'), deferrals: deferrals };
  }

  async function prepareInterviewPrompt() {
    try {
      const answers = collectInterviewAnswers();
      const result = await call('prepareLedgerInterviewPrompt', state.buildSession.buildSessionId, answers.text, answers.deferrals);
      document.getElementById('interview-prompt').value = result.prompt;
      document.getElementById('interview-reply').value = '';
      state.buildSession.data.lastInterviewPrompt = result.prompt;
      state.buildSession.readiness = result.readiness;
      renderLedgerPanels();
      toast('取材プロンプト（ラウンド' + result.round + '）を作成しました。コピーして生成AIへ渡し、回答全文を貼り付けてください。');
    } catch (error) { showError(error); }
  }

  async function importInterviewReply() {
    try {
      const result = await call('importLedgerInterviewReply', state.buildSession.buildSessionId, document.getElementById('interview-reply').value);
      const data = state.buildSession.data;
      data.ledger = result.ledger;
      data.pendingQuestions = result.questions || [];
      data.lastInterviewPrompt = '';
      data.interviewRounds = (data.interviewRounds || []).concat([{ round: result.round, score: result.readiness.overallScore }]);
      state.buildSession.readiness = result.readiness;
      state.buildSession.currentStep = result.readiness.gatePassed ? 6 : 5;
      document.getElementById('interview-reply').value = '';
      document.getElementById('interview-free-answer').value = '';
      renderInterviewResult(result);
      renderInterviewPanel();
      renderLedgerPanels();
      renderBuilderStepper();
      toast('台帳を更新しました（追加' + result.applied.added + '件 / 更新' + result.applied.updated + '件 / 準備度' + result.readiness.overallScore + '%）。');
    } catch (error) { showError(error); }
  }

  function renderInterviewResult(result) {
    const sections = result.sections || {};
    const block = function (title, text) {
      return text ? '<details open class="interaction-item"><summary><strong>' + escapeHtml(title) + '</strong></summary><p>' + escapeHtml(text).replace(/\n/g, '<br>') + '</p></details>' : '';
    };
    let html = '';
    if ((result.applied.skipped || []).length) html += '<div class="notice warning"><strong>形式不備で無視したエントリ</strong><ul>' + result.applied.skipped.map(function (item) { return '<li>' + escapeHtml(item) + '</li>'; }).join('') + '</ul></div>';
    html += block('回答の理解確認（誤解があればここで気づけます）', sections.echo);
    html += block('矛盾・気づき', sections.contradictions);
    html += block('仮値の監査', sections.assumedAudit);
    if (result.stagnant) html += '<div class="notice warning"><strong>準備度が2ラウンド続けて増えていません。</strong> 答えられない質問を持ち続けるより、残りを「作業前に確認」へ降格して先へ進むことを検討してください（STEP 6 の一括降格）。重要なのは全知ではなく、何が未確認かの明示です。</div>';
    if ((result.demotionCandidates || []).length) {
      html += '<div class="notice warning"><strong>2回以上残っている質問があります。</strong><ul>' +
        result.demotionCandidates.map(function (question) { return '<li>' + escapeHtml((question.stepRef || '全般') + ' / ' + (question.slot || '-') + ': ' + question.text.split(/\r?\n/)[0]) + '</li>'; }).join('') +
        '</ul><p>答えを得られない場合は、STEP 6 で該当項目を「作業前に確認」へ降格してください。</p></div>';
    }
    document.getElementById('interview-result').innerHTML = html;
  }

  const LEDGER_SLOT_COLUMNS = [['url', 'URL'], ['ui_label', '画面表記'], ['input_value', '入力値'], ['verification', '完了確認'], ['precondition', '前提'], ['failure_recovery', '失敗時'], ['caution', '注意'], ['decision_rule', '判断'], ['scope', '範囲']];
  const LEDGER_STATE_MARKS = { confirmed: '●', assumed: '◐', unknown: '○', deferred: '▽', missing: '·' };

  function renderLedgerPanels() {
    const session = state.buildSession;
    const readiness = session ? session.readiness : null;
    const heatmap = document.getElementById('ledger-heatmap');
    if (!readiness) {
      heatmap.innerHTML = '<p class="muted">STEP 4 で台帳を初期化すると、ここにステップ×スロットの準備度ヒートマップが表示されます。</p>';
      document.getElementById('ledger-open-entries').innerHTML = '';
      return;
    }
    heatmap.innerHTML = '<div class="validation-box ' + (readiness.gatePassed ? 'success' : 'error') + '"><strong>' + (readiness.gatePassed ? 'ゲート通過可能です。' : 'まだ穴があります（未解消 ' + readiness.holes.length + '箇所）。') + '</strong> 全体準備度 ' + readiness.overallScore + '%</div>' +
      '<div class="heatmap-wrap"><table class="heatmap"><thead><tr><th>ステップ</th>' + LEDGER_SLOT_COLUMNS.map(function (column) { return '<th>' + escapeHtml(column[1]) + '</th>'; }).join('') + '<th>準備度</th></tr></thead><tbody>' +
      readiness.steps.map(function (step) {
        return '<tr><th>' + escapeHtml(step.skeletonId + ' ' + step.title) + '</th>' + LEDGER_SLOT_COLUMNS.map(function (column) {
          const cellState = step.slots[column[0]] || 'missing';
          return '<td class="hm-' + attr(cellState) + '" title="' + attr(column[1] + ': ' + cellState) + '">' + LEDGER_STATE_MARKS[cellState] + '</td>';
        }).join('') + '<td>' + step.score + '%</td></tr>';
      }).join('') + '</tbody></table></div><p class="meta">● confirmed（確認済み）　◐ assumed（仮値・要確認）　○ unknown（不明）　▽ 作業前に確認へ降格　· エントリなし</p>';
    renderOpenEntries();
  }

  function renderOpenEntries() {
    const ledger = state.buildSession.data.ledger || [];
    const open = ledger.filter(function (entry) { return entry.confidence !== 'confirmed' && entry.deferred !== true; });
    const deferred = ledger.filter(function (entry) { return entry.deferred === true; });
    let html = open.length ? '<div class="page-heading compact"><h4>未確認の項目（' + open.length + '件）</h4></div>' + open.map(function (entry) {
      const metaText = entry.entryId + ' / ' + (entry.stepRef || '全般') + ' / ' + entry.slot + ' / ' + (entry.confidence === 'assumed' ? '仮値: ' + (entry.value || '-') : '不明') + (entry.note ? ' / ' + entry.note : '');
      return '<div class="list-row"><div><strong>' + escapeHtml(entry.claim) + '</strong><div class="meta">' + escapeHtml(metaText) + '</div></div><div class="button-row"><button class="secondary" onclick="App.confirmLedgerEntry(\'' + attr(entry.entryId) + '\')">' + (entry.confidence === 'assumed' && entry.value ? '仮値で合っている' : '正しい値を入力して確認') + '</button><button class="secondary" onclick="App.deferLedgerEntry(\'' + attr(entry.entryId) + '\')">作業前に確認へ</button></div></div>';
    }).join('') : '<p class="muted">未確認の項目はありません。</p>';
    if (deferred.length) html += '<details><summary>作業前に確認へ降格した項目（' + deferred.length + '件） — ガイドの前提条件に明示されます</summary>' + deferred.map(function (entry) {
      const metaText = entry.entryId + ' / ' + (entry.stepRef || '全般') + ' / ' + entry.slot + (entry.value ? ' / 見立て: ' + entry.value : '');
      return '<div class="list-row"><div><strong>' + escapeHtml(entry.claim) + '</strong><div class="meta">' + escapeHtml(metaText) + '</div></div><button class="secondary" onclick="App.reopenLedgerEntry(\'' + attr(entry.entryId) + '\')">降格を取り消す</button></div>';
    }).join('') + '</details>';
    document.getElementById('ledger-open-entries').innerHTML = html;
  }

  async function confirmLedgerEntry(entryId) {
    try {
      const entry = (state.buildSession.data.ledger || []).find(function (item) { return String(item.entryId) === String(entryId); });
      let value = entry && entry.value ? entry.value : '';
      if (entry && entry.confidence === 'assumed' && value) {
        if (!window.confirm('仮値「' + value + '」を確認済み（confirmed）にしますか？\n実際の画面・現物と一致していることを確認してください。')) return;
      } else {
        value = window.prompt('確認済みにする正しい値を入力してください（URL・画面の文言など、現物をそのまま貼るのが確実です）', value || '');
        if (value === null || !value.trim()) return;
      }
      const result = await call('updateLedgerEntry', state.buildSession.buildSessionId, entryId, 'confirm', value);
      state.buildSession.data.ledger = result.ledger;
      state.buildSession.readiness = result.readiness;
      renderLedgerPanels();
      renderInterviewPanel();
      renderSkeletonSummary();
      toast('確認済みにしました。');
    } catch (error) { showError(error); }
  }

  async function deferLedgerEntry(entryId) {
    try {
      const result = await call('updateLedgerEntry', state.buildSession.buildSessionId, entryId, 'defer', '');
      state.buildSession.data.ledger = result.ledger;
      state.buildSession.readiness = result.readiness;
      renderLedgerPanels();
      renderInterviewPanel();
      toast('作業前に確認へ降格しました。ガイドの前提条件に明示されます。');
    } catch (error) { showError(error); }
  }

  async function reopenLedgerEntry(entryId) {
    try {
      const result = await call('updateLedgerEntry', state.buildSession.buildSessionId, entryId, 'reopen', '');
      state.buildSession.data.ledger = result.ledger;
      state.buildSession.readiness = result.readiness;
      renderLedgerPanels();
      renderInterviewPanel();
      toast('降格を取り消しました。取材ループで確認できます。');
    } catch (error) { showError(error); }
  }

  async function deferAllOpenEntries() {
    if (!window.confirm('未確認（unknown / assumed）の項目をすべて「作業前に確認」へ降格しますか？\n降格した項目はガイドの前提条件に「作業前に確認: …」として明示されます。')) return;
    try {
      const result = await call('deferAllOpenLedgerEntries', state.buildSession.buildSessionId);
      state.buildSession.data.ledger = result.ledger;
      state.buildSession.readiness = result.readiness;
      renderLedgerPanels();
      renderInterviewPanel();
      toast(result.deferredCount + '件を作業前に確認へ降格しました。');
    } catch (error) { showError(error); }
  }

  async function cancelBuild() {
    const session = state.buildSession;
    if (!session || !window.confirm('この作業ガイドの作成をやめ、ガイド対象から削除しますか？\nこの作成セッションは再開できなくなり、作業候補一覧にも表示されなくなります。')) return;
    try {
      await call('cancelWorkGuideBuild', session.buildSessionId);
      state.buildSession = null;
      state.editGuide = null;
      state.saveRequestToken = '';
      resetBuilderForm();
      document.getElementById('builder-workspace').classList.add('hidden');
      document.getElementById('builder-empty').classList.remove('hidden');
      await showView('actions');
      toast('作成を中止し、ガイド対象から削除しました。');
    } catch (error) { showError(error); }
  }

  async function prepareSkeletonPrompt() {
    try {
      const selectedIds = (state.buildSession.data.selectedSources || []).map(function (source) { return source.fileId; })
        .concat(Array.from(document.querySelectorAll('[name="source-file"]:checked')).map(function (input) { return input.value; }))
        .filter(function (fileId, index, list) { return fileId && list.indexOf(fileId) === index; });
      const known = document.getElementById('known-prerequisites').value.split(/\r?\n/).map(function (value) { return value.trim(); }).filter(Boolean);
      const result = await call('prepareGuideSkeletonPrompt', state.buildSession.buildSessionId, selectedIds, known);
      document.getElementById('skeleton-prompt').value = result.prompt;
      state.buildSession.data.knownPrerequisites = known;
      state.buildSession.data.selectedSources = result.selectedSources;
      state.buildSession.data.lastSkeletonPrompt = result.prompt;
      state.buildSession.currentStep = 4;
      renderBuilderStepper();
      toast('骨格・台帳初期化プロンプトを作成しました。会議の文字起こしは自動で情報源に含まれています。');
    } catch (error) { showError(error); }
  }

  async function importSkeleton() {
    try {
      const result = await call('importGuideSkeleton', state.buildSession.buildSessionId, document.getElementById('skeleton-import').value);
      const data = state.buildSession.data;
      data.skeleton = result.skeleton;
      data.ledger = result.ledger;
      data.pendingQuestions = [];
      data.interviewRounds = [];
      data.lastSkeletonPrompt = '';
      state.buildSession.readiness = result.readiness;
      state.buildSession.currentStep = 5;
      document.getElementById('skeleton-import').value = '';
      renderSkeletonSummary();
      renderInterviewPanel();
      renderLedgerPanels();
      renderBuilderStepper();
      toast((result.skipped || []).length
        ? '骨格と台帳を初期化しました（' + result.skipped.length + '件は形式不備で無視）。STEP 5 の取材ループへ進んでください。'
        : '骨格と台帳を初期化しました。STEP 5 の取材ループへ進んでください。');
    } catch (error) { showError(error); }
  }

  async function searchSources() {
    try {
      const result = await call('searchDriveSources', document.getElementById('source-query').value);
      state.sourceResults = result.files || [];
      const selected = (state.buildSession.data.selectedSources || []).map(function (source) { return source.fileId; });
      document.getElementById('source-results').innerHTML = state.sourceResults.length ? state.sourceResults.map(function (file) {
        return '<label class="list-row"><span><strong>' + escapeHtml(file.name) + '</strong><span class="meta">' + escapeHtml(file.updatedAt || '') + '</span></span><input type="checkbox" name="source-file" value="' + attr(file.fileId) + '" ' + (selected.indexOf(file.fileId) >= 0 ? 'checked' : '') + '></label>';
      }).join('') : '<p class="empty">該当ファイルなし</p>';
    } catch (error) { showError(error); }
  }

  async function prepareGuidePrompt() {
    try {
      const confirmed = document.getElementById('gate-confirm').checked;
      const result = await call('prepareWorkGuidePrompt', state.buildSession.buildSessionId, confirmed);
      document.getElementById('guide-prompt').value = result.prompt;
      document.getElementById('guide-json-prompt-stage').classList.remove('hidden');
      state.buildSession.data.lastAiPrompt = result.prompt;
      state.buildSession.data.lastAiPromptPhase = 'work_guide_generation';
      state.buildSession.data.gatePassed = true;
      state.buildSession.readiness = result.readiness;
      state.buildSession.currentStep = 6;
      renderBuilderStepper();
      toast('準備度ゲートを通過しました。台帳を唯一の事実源とするJSON生成プロンプトを作成しました。');
    } catch (error) {
      if (error.details && error.details.holes && error.details.holes.length) {
        showError(new Error(error.message + ' 穴: ' + error.details.holes.map(function (hole) { return hole.skeletonId + '/' + hole.slot; }).join('、')));
      } else showError(error);
    }
  }

  async function importGuide() {
    const box = document.getElementById('guide-import-validation');
    try {
      const result = await call('importWorkGuideToBuild', state.buildSession.buildSessionId, document.getElementById('guide-json-import').value);
      state.editGuide = result.workGuide;
      state.saveRequestToken = '';
      state.buildSession.data.importedWorkGuide = result.workGuide;
      state.buildSession.data.depthFindings = result.depthFindings || [];
      state.buildSession.data.deskReview = null;
      state.buildSession.currentStep = 8;
      box.className = 'validation-box success';
      box.textContent = (result.depthFindings || []).length
        ? '検証・台帳突合OK。ただし具体度チェックで ' + result.depthFindings.length + ' 件の不足があります。STEP 8 で生成AIに点検・修正させてください。'
        : '検証・台帳突合OK。STEP 8 の机上実行レビューで、初見の作業者として通し読みさせてください。';
      document.getElementById('revision-prompt').value = '';
      document.getElementById('desk-review-prompt').value = '';
      document.getElementById('desk-review-reply').value = '';
      renderBuilder();
      document.getElementById('guide-review-panel').scrollIntoView({ behavior: 'smooth' });
    } catch (error) { renderValidationError(box, error); }
  }

  async function prepareDeskReviewPrompt() {
    try {
      const result = await call('prepareDeskReviewPrompt', state.buildSession.buildSessionId);
      document.getElementById('desk-review-prompt').value = result.prompt;
      state.buildSession.data.lastDeskReviewPrompt = result.prompt;
      toast('机上実行レビュープロンプトを作成しました。必ず新しいチャット（初見の条件）に貼ってください。');
    } catch (error) { showError(error); }
  }

  async function importDeskReviewReply() {
    try {
      const result = await call('importDeskReviewReply', state.buildSession.buildSessionId, document.getElementById('desk-review-reply').value);
      const data = state.buildSession.data;
      data.lastDeskReviewPrompt = '';
      data.deskReview = { passed: result.passed, findings: result.findings, trace: result.trace };
      if (result.ledger) data.ledger = result.ledger;
      if (result.readiness) state.buildSession.readiness = result.readiness;
      if (!result.passed) data.gatePassed = false;
      state.buildSession.currentStep = result.currentStep || (result.passed ? 9 : 5);
      document.getElementById('desk-review-reply').value = '';
      renderDeskReviewResult(data.deskReview);
      renderLedgerPanels();
      renderInterviewPanel();
      renderBuilderStepper();
      if (result.passed && state.editGuide) renderGuideEditor();
      else {
        document.getElementById('guide-editor-panel').classList.add('hidden');
        document.getElementById('guide-save-panel').classList.add('hidden');
      }

  function arrayFieldHtml(field, label, values) {

  function stepEditorHtml(step, index) {
    return '<div class="guide-step-editor" data-step-index="' + index + '"><div class="step-actions"><strong>手順 ' + (index + 1) + '</strong><button class="secondary" onclick="App.moveGuideStep(' + index + ',-1)">↑</button><button class="secondary" onclick="App.moveGuideStep(' + index + ',1)">↓</button><button class="secondary" onclick="App.duplicateGuideStep(' + index + ')">複製</button><button class="danger" onclick="App.deleteGuideStep(' + index + ')">削除</button></div><div class="field-grid">' +
      '<label>手順名<input data-step-field="title" value="' + attr(step.title || '') + '"></label><label>タイプ<select data-step-field="type"><option value="input" ' + (step.type === 'input' ? 'selected' : '') + '>input</option><option value="script" ' + (step.type === 'script' ? 'selected' : '') + '>script</option></select></label>' +
      '<label>URL<input data-step-field="url" value="' + attr(step.url || '') + '"></label><label>参照資料ID（カンマ区切り）<input data-step-field="sourceReferences" value="' + attr((step.sourceReferences || []).join(',')) + '"></label></div>' +
      '<label>手順説明<textarea rows="3" data-step-field="description">' + escapeHtml(step.description || '') + '</textarea></label><label>入力項目 JSON<textarea rows="4" data-step-field="inputs">' + escapeHtml(JSON.stringify(step.inputs || [], null, 2)) + '</textarea></label>' +
      '<div class="field-grid"><label>登録スクリプトID<input data-step-field="scriptId" value="' + attr(step.scriptId || '') + '"></label><label>スクリプトパラメータ JSON<textarea rows="3" data-step-field="scriptParams">' + escapeHtml(JSON.stringify(step.scriptParams || {}, null, 2)) + '</textarea></label></div>' +
      '<label>完了条件<textarea rows="2" data-step-field="completionCriteria">' + escapeHtml(step.completionCriteria || '') + '</textarea></label>' +
      '<div class="field-grid"><label>このステップで変わらないこと（scopeNote・空欄可）<input data-step-field="scopeNote" value="' + attr(step.scopeNote || '') + '"></label><label>根拠台帳エントリID（カンマ区切り・空欄可）<input data-step-field="evidenceRefs" value="' + attr((step.evidenceRefs || []).join(',')) + '"></label></div>' +
      '<div class="field-grid"><label>完了確認 JSON（verification・空欄可）<textarea rows="2" data-step-field="verification">' + escapeHtml(step.verification ? JSON.stringify(step.verification, null, 2) : '') + '</textarea></label><label>失敗時対処 JSON（failureRecovery・空欄可）<textarea rows="2" data-step-field="failureRecovery">' + escapeHtml(step.failureRecovery ? JSON.stringify(step.failureRecovery, null, 2) : '') + '</textarea></label></div></div>';
  }

  function collectGuideEditor() {
    const guide = JSON.parse(JSON.stringify(state.editGuide));
    document.querySelectorAll('[data-guide-field]').forEach(function (field) {
      if (['assumptions', 'prerequisites', 'warnings'].indexOf(field.dataset.guideField) >= 0) guide[field.dataset.guideField] = field.value.split(/\r?\n/).map(function (value) { return value.trim(); }).filter(Boolean);
      else guide[field.dataset.guideField] = field.value.trim();
    });
    guide.steps = Array.from(document.querySelectorAll('.guide-step-editor')).map(function (editor, index) {
      const values = {};
      editor.querySelectorAll('[data-step-field]').forEach(function (field) { values[field.dataset.stepField] = field.value; });
      // 台帳由来の拡張フィールドを失わないよう、既存手順をベースに編集値を上書きする。
      const step = Object.assign({}, guide.steps[index] || {}, {
        stepId: (guide.steps[index] && guide.steps[index].stepId) || 'S' + (index + 1), order: index + 1,
        type: values.type, title: values.title.trim(), description: values.description.trim(), url: values.url.trim(),
        completionCriteria: values.completionCriteria.trim(),
        sourceReferences: values.sourceReferences.split(',').map(function (value) { return value.trim(); }).filter(Boolean)
      });
      const scopeNote = (values.scopeNote || '').trim();
      if (scopeNote) step.scopeNote = scopeNote; else delete step.scopeNote;
      const evidenceRefs = (values.evidenceRefs || '').split(',').map(function (value) { return value.trim(); }).filter(Boolean);
      if (evidenceRefs.length) step.evidenceRefs = evidenceRefs; else delete step.evidenceRefs;
      if ((values.verification || '').trim()) step.verification = JSON.parse(values.verification); else delete step.verification;
      if ((values.failureRecovery || '').trim()) step.failureRecovery = JSON.parse(values.failureRecovery); else delete step.failureRecovery;
      if (step.type === 'input') { step.inputs = JSON.parse(values.inputs || '[]'); delete step.scriptId; delete step.scriptParams; }
      else { step.scriptId = values.scriptId.trim(); step.scriptParams = JSON.parse(values.scriptParams || '{}'); delete step.inputs; }
      return step;
    });
    guide.steps.forEach(function (step, index) { step.stepId = 'S' + (index + 1); step.order = index + 1; });
    return guide;
  }

  function syncGuideEditor() {
    try { state.editGuide = collectGuideEditor(); return true; }
    catch (error) { showError(new Error('入力項目・スクリプトパラメータ・完了確認・失敗時対処の JSON が不正です: ' + error.message)); return false; }
  }

  function addGuideStep() {
    if (!syncGuideEditor()) return;
    state.editGuide.steps.push({ stepId: '', order: state.editGuide.steps.length + 1, type: 'input', title: '', description: '', url: '', inputs: [{ inputId: 'I1', label: '結果', inputType: 'text', required: true }], completionCriteria: '', sourceReferences: [] });
    normalizeGuideSteps(); renderGuideEditor();
  }

  function deleteGuideStep(index) { if (!syncGuideEditor()) return; if (state.editGuide.steps.length <= 1) return showError(new Error('手順は1件以上必要です。')); state.editGuide.steps.splice(index, 1); normalizeGuideSteps(); renderGuideEditor(); }
  function moveGuideStep(index, direction) { if (!syncGuideEditor()) return; const target = index + direction; if (target < 0 || target >= state.editGuide.steps.length) return; const item = state.editGuide.steps.splice(index, 1)[0]; state.editGuide.steps.splice(target, 0, item); normalizeGuideSteps(); renderGuideEditor(); }
  function duplicateGuideStep(index) { if (!syncGuideEditor()) return; const copy = JSON.parse(JSON.stringify(state.editGuide.steps[index])); state.editGuide.steps.splice(index + 1, 0, copy); normalizeGuideSteps(); renderGuideEditor(); }
  function normalizeGuideSteps() { state.editGuide.steps.forEach(function (step, index) { step.stepId = 'S' + (index + 1); step.order = index + 1; (step.inputs || []).forEach(function (input, inputIndex) { input.inputId = 'I' + (inputIndex + 1); }); }); }

    button.disabled = true;
    if (!state.saveRequestToken) state.saveRequestToken = createRequestToken();

      });

  function renderExecution() {
    const execution = state.execution;
    const guide = state.executionGuide;
    const steps = (guide.steps || []).slice().sort(function (a, b) { return a.order - b.order; });
    const completedIds = (execution.executionData && execution.executionData.completedStepIds) || [];
    showGuideScreen('execution');
    document.getElementById('pause-execution-button').classList.toggle('hidden', execution.status !== 'in_progress');
    document.getElementById('complete-execution-button').classList.add('hidden');
    document.getElementById('execution-header').innerHTML = '<div class="page-heading compact"><div><p class="eyebrow">' + escapeHtml(statusLabel(execution.status)) + '</p><h3>' + escapeHtml(guide.title) + '</h3></div><span class="meta">完了 ' + completedIds.length + ' / ' + steps.length + ' 手順</span></div>';
    renderExecutionStepper(steps, execution, completedIds);
    if (execution.status === 'paused') {
      document.getElementById('execution-step').innerHTML = '<div class="notice warning">中断中です。ここまでの入力は保存されています。</div><button onclick="App.resumeExecution()">続きから再開</button>';
      return;
    }
    if (execution.status === 'completed') {
      document.getElementById('execution-step').innerHTML = '<div class="validation-box success">この作業は完了しています。お疲れさまでした。</div>';
      return;
    }
    const stepIndex = steps.findIndex(function (item) { return item.stepId === execution.currentStepId; });
    const step = steps[stepIndex];
    if (!step) {
      document.getElementById('execution-step').innerHTML = '<div class="validation-box success">すべての手順が完了しました。「作業を完了」を押すと実行結果を保存します。</div>';
      document.getElementById('complete-execution-button').classList.remove('hidden');
      return;
    }
    const total = steps.length;
    let actionIndex = 0;
    let html = '<div class="exec-step-lead"><span class="exec-step-count">ステップ ' + (stepIndex + 1) + ' / ' + total + '</span><h4>' + escapeHtml(step.title) + '</h4></div>';
    if (step.scopeNote) html += '<p class="meta">このステップで変わらないこと: ' + escapeHtml(step.scopeNote) + '</p>';
    if (step.description) html += '<p>' + escapeHtml(step.description) + '</p>';
    if (step.url) {
      actionIndex++;
      html += actionCardHtml(actionIndex, 'このURLを開いて作業します', '<a class="action-open" target="_blank" rel="noopener" href="' + attr(step.url) + '">🔗 URLを開く</a><div class="action-url">' + escapeHtml(step.url) + '</div>');
    }
    if (step.type === 'script') {
      actionIndex++;
      const savedParams = execution.executionData.stepData && execution.executionData.stepData[step.stepId];
      html += actionCardHtml(actionIndex, '登録スクリプト「' + escapeHtml(step.scriptId) + '」を実行します', '<label>実行パラメータ JSON<textarea id="execution-script-params" rows="5">' + escapeHtml(JSON.stringify(savedParams || step.scriptParams || {}, null, 2)) + '</textarea></label><div class="notice warning" style="margin:.6rem 0 0">「この手順を完了して次へ」を押すとスクリプトが実行されます。</div>');
    } else {
      actionIndex++;
      const fields = (step.inputs || []).map(execInputFieldHtml).join('') || '<p class="muted">入力項目はありません。作業を終えたら次へ進んでください。</p>';
      html += actionCardHtml(actionIndex, '作業した結果を入力します', fields);
    }
    if (step.completionCriteria) html += '<div class="completion-note"><strong>完了条件:</strong> ' + escapeHtml(step.completionCriteria) + '</div>';
    if (step.verification && step.verification.detail) html += '<div class="completion-note"><strong>完了確認（' + escapeHtml(step.verification.method || 'visual') + '）:</strong> ' + escapeHtml(step.verification.detail) + '</div>';
    if (step.failureRecovery && (step.failureRecovery.checks || []).length) {
      html += '<div class="notice warning" style="margin-top:.9rem"><strong>失敗した場合に確認する点:</strong><ul>' + step.failureRecovery.checks.map(function (check) { return '<li>' + escapeHtml(check) + '</li>'; }).join('') + '</ul>' + (step.failureRecovery.resumeFrom ? '<p>やり直す手順: ' + escapeHtml(step.failureRecovery.resumeFrom) + '</p>' : '') + '</div>';
    }
    const stepExternalRefs = ((execution.executionData && execution.executionData.externalReferences) || []).filter(function (reference) { return String(reference.stepId) === String(step.stepId); });
    html += '<div class="button-row" style="margin-top:1rem"><button onclick="App.saveCurrentStep()">' + (stepIndex + 1 >= total ? 'この手順を保存して完了へ' : 'この手順を完了して次へ →') + '</button><button class="secondary" onclick="App.recordExternalReference()">ガイド外の資料を見た / 人に聞いた' + (stepExternalRefs.length ? '（' + stepExternalRefs.length + '件記録済み）' : '') + '</button></div>';
    document.getElementById('execution-step').innerHTML = html;
  }

  function renderExecutionStepper(steps, execution, completedIds) {
    document.getElementById('execution-progress').innerHTML = '<ol class="stepper">' + steps.map(function (step) {
      const done = completedIds.indexOf(step.stepId) >= 0;
      const current = String(step.stepId) === String(execution.currentStepId) && execution.status === 'in_progress';
      return '<li class="' + (current ? 'current' : (done ? 'done' : '')) + '" title="' + attr(step.title) + '">' + step.order + '</li>';
    }).join('') + '</ol>';
  }

  function actionCardHtml(index, title, body) {
    return '<div class="action-step"><div class="action-title"><span class="action-index">' + index + '</span>' + title + '</div><div class="action-body">' + body + '</div></div>';
  }

  function execInputFieldHtml(input) {
    if (input.inputType === 'check') return '<label class="check-line"><input type="checkbox" data-exec-input="' + attr(input.inputId) + '">' + escapeHtml(input.label) + '</label>';
    if (input.inputType === 'choice') return '<label>' + escapeHtml(input.label) + '<select data-exec-input="' + attr(input.inputId) + '"><option value="">選択</option>' + (input.choices || []).map(function (choice) { return '<option>' + escapeHtml(choice) + '</option>'; }).join('') + '</select></label>';
    return '<label>' + escapeHtml(input.label) + '<textarea rows="3" data-exec-input="' + attr(input.inputId) + '"></textarea></label>';
  }

  async function saveCurrentStep() {
    try {
      const step = state.executionGuide.steps.find(function (item) { return item.stepId === state.execution.currentStepId; });
      const values = {};
      let params = {};
      if (step.type === 'input') document.querySelectorAll('[data-exec-input]').forEach(function (input) { values[input.dataset.execInput] = input.type === 'checkbox' ? input.checked : input.value; });
      else params = JSON.parse(document.getElementById('execution-script-params').value || '{}');
      const result = await call('saveExecutionStep', state.execution.executionId, values, params);
      state.execution.executionData = result.executionData;
      state.execution.currentStepId = result.nextStepId;
      renderExecution();
      toast('手順を保存しました。');
    } catch (error) { showError(error); }
  }

    const execution = state.execution;
    if (!execution || !execution.currentStepId) return showError(new Error('記録対象の手順がありません。'));
    const note = window.prompt('ガイド外で何を調べたか、または誰に何を聞いたかを1行で入力してください。');

    try {
      const result = await call('recordExecutionExternalReference', execution.executionId, execution.currentStepId, note.trim());

      renderExecution();
      toast('ガイド外参照を記録しました。次の版を作るときの取材対象になります。');

  function renderAutomationPanel() {

      ? '<span class="status-pill">有効</span> ' + escapeHtml(automation.intervalMinutes + '分ごとに文字起こしを確認します。') + (automation.aiAutomation && automation.aiAutomation.autoProcessingEnabled ? ' AI解析・ガイド生成も自動です。' : ' AI処理は手動です。')

  function automationLastRunHtml(lastRun) {
    if (!lastRun) return '<p class="muted">まだ実行されていません。</p>';
    const registered = lastRun.registered || [];
    const skipped = lastRun.skipped || [];
    const analyzed = lastRun.analyzedMeetings || [];
    const guides = lastRun.generatedGuides || [];
    const failures = lastRun.automationFailures || [];
    const pending = lastRun.automationPending || [];
    let html = '<p class="meta">最終実行: ' + escapeHtml(lastRun.ranAt) + ' / 登録 ' + registered.length + '件 / 会議解析 ' + analyzed.length + '件 / ガイド生成 ' + guides.length + '件 / 失敗 ' + failures.length + '件 / 続き待ち ' + pending.length + '件</p>';
    if (registered.length) html += '<ul>' + registered.map(function (item) { return '<li>' + escapeHtml(item.name + ' → ' + item.meetingId + '（' + item.category + '）') + '</li>'; }).join('') + '</ul>';
    if (skipped.length) html += '<details><summary>対象外の理由</summary><ul>' + skipped.map(function (item) { return '<li>' + escapeHtml(item.name + ': ' + item.reason) + '</li>'; }).join('') + '</ul></details>';
    if (analyzed.length) html += '<ul>' + analyzed.map(function (item) { return '<li>' + escapeHtml(item.title + ': クイズ ' + item.quizQuestionCount + '問 / 作業候補 ' + item.actionCount + '件') + '</li>'; }).join('') + '</ul>';
    if (guides.length) html += '<ul>' + guides.map(function (item) { return '<li>' + escapeHtml(item.title + ' → 承認待ち') + '</li>'; }).join('') + '</ul>';
    if (failures.length) html += '<details open><summary>自動処理の失敗</summary><ul>' + failures.map(function (item) { return '<li>' + escapeHtml((item.meetingId || '') + ' ' + (item.actionId || '') + ': ' + item.error) + '</li>'; }).join('') + '</ul></details>';
    if (lastRun.aiAutomationSkipped) html += '<p class="muted">' + escapeHtml(lastRun.aiAutomationSkipped) + '</p>';
    return html;
  }

      toast('クリップボードへコピーしました。');

  function renderValidationError(box, error) {
    box.className = 'validation-box error';
    const errors = error.details && error.details.errors ? error.details.errors : [];
    box.innerHTML = '<strong>' + escapeHtml(error.message) + '</strong>' + (errors.length ? '<ul>' + errors.map(function (item) { return '<li>' + escapeHtml(item) + '</li>'; }).join('') + '</ul>' : '');
  }

  function showError(error) { toast(error.message || String(error), true); }
  function toast(message, isError) { const element = document.getElementById('toast'); element.textContent = message; element.className = 'show' + (isError ? ' error' : ''); window.clearTimeout(toast.timer); toast.timer = window.setTimeout(function () { element.className = ''; }, 4500); }
  function setBusy(value) { document.getElementById('busy').classList.toggle('hidden', !value); }
  function createRequestToken() { return window.crypto && crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).slice(2); }
  function escapeHtml(value) { return String(value === undefined || value === null ? '' : value).replace(/[&<>"']/g, function (char) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char]; }); }
  function attr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }
